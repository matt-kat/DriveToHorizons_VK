<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>LongDrivetoHorizonsSim</title>
        <link rel="preconnect" href="https://bridge.playgama.com">
        <link rel="preload" href="Build/DriveToHorizons_VK.wasm.br" as="fetch" type="application/wasm" crossorigin>
        <link rel="preload" href="Build/DriveToHorizons_VK.data.br" as="fetch" crossorigin>
        <link rel="preload" href="Build/DriveToHorizons_VK.framework.js.br" as="script">
        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0px;
                margin: 0px;
            }
            .fullscreen-canvas {
                background: #242424;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0px;
                left: 0px;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas" class="fullscreen-canvas"></canvas>
        <script>
            (() => {
                const playgamaTextPattern = /^\s*playgama\s*$/i

                function hidePlaygamaLabel(root) {
                    if (!root || root.nodeType !== Node.ELEMENT_NODE) {
                        return
                    }

                    const elements = [root, ...root.querySelectorAll('*')]
                    elements.forEach(element => {
                        if (playgamaTextPattern.test((element.textContent || '').trim())) {
                            element.style.display = 'none'
                        }
                    })

                    root.querySelectorAll('svg text').forEach(textElement => {
                        if (playgamaTextPattern.test((textElement.textContent || '').trim())) {
                            textElement.style.display = 'none'
                        }
                    })
                }

                function installPlaygamaLabelHider() {
                    const observer = new MutationObserver(mutations => {
                        mutations.forEach(mutation => {
                            mutation.addedNodes.forEach(node => hidePlaygamaLabel(node))
                        })
                    })

                    hidePlaygamaLabel(document.body)
                    observer.observe(document.body, { childList: true, subtree: true })

                    const stopObserverWhenUnityStarts = setInterval(() => {
                        if (window.unityInstance) {
                            observer.disconnect()
                            clearInterval(stopObserverWhenUnityStarts)
                        }
                    }, 500)
                }

                if (document.body) {
                    installPlaygamaLabelHider()
                } else {
                    window.addEventListener('DOMContentLoaded', installPlaygamaLabelHider, { once: true })
                }
            })()
        </script>
        <script src="./playgama-bridge-unity.js"></script>
    </body>
</html>
